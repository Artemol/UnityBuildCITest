name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}
env:
  GAME_NAME: CITestGame
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build ${{matrix.target}}
    runs-on: ${{matrix.runner}}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: StandaloneWindows64
            runner: windows-latest
          - target: StandaloneOSX
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/cache@v5
        with:
          path: ./Library
          key: Library-${{env.GAME_NAME}}-${{matrix.target}}
          restore-keys: |
            Library-${{env.GAME_NAME}}-${{matrix.target}}
            Library-${{env.GAME_NAME}}-
            Library-
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{secrets.UNITY_EMAIL}}
          UNITY_PASSWORD: ${{secrets.UNITY_PASSWORD}}
          UNITY_LICENSE: ${{secrets.UNITY_LICENSE}}
        with:
          targetPlatform: ${{matrix.target}}
          buildName: ${{env.GAME_NAME}}
      - name: Add README
        run: |
          if [ -f README.md ]; then
            cp README.md build/README.md
          elif [ -f README.txt ]; then
            cp README.txt build/README.txt
          else
            echo "No README found; skipping."
          fi
      # - name: Package Build
      #   run: |
      #     cd build
      #     zip -r "../${{env.GAME_NAME}}-${{matrix.target}}.zip" .
      - uses: actions/upload-artifact@v6
        with:
          name: ${{env.GAME_NAME}}-${{matrix.target}}
          path: build
  releases:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Package artifacts
        run: |
          cd dist
          zip -r ../${{env.GAME_NAME}}-Windows.zip ${{env.GAME_NAME}}-StandaloneWindows64
          zip -r ../${{env.GAME_NAME}}-macOS.zip ${{env.GAME_NAME}}-StandaloneOSX
      - name: Create draft release
        env:
          GH_TOKEN: ${{github.token}}
        run: |
          gh release create "ci-${{github.run_number}}" \
            ./*.zip \
            --draft \
            --title "CI Build ${{github.run_number}}" \
            --notes "Automated CI build from ${{github.sha}}"
